---
name: tests

'on': [push, pull_request]

jobs:
  pre_commit_checks:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Python setup
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        # astral-sh/setup-uv v6.7.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Install pre-commit
        run: uv tool install pre-commit
      - name: Run pre-commit
        run: |
          uv run --with pre-commit \
            pre-commit run --all-files

  test_matrix:
    strategy:
      matrix:
        python_version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Python setup
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install uv
        # astral-sh/setup-uv v6.7.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Run pytest
        run: uv run --frozen pytest

  docs_and_integrations:
    runs-on: ubuntu-24.04
    steps:
      # actions/checkout v4.3.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Python setup
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install uv
        # astral-sh/setup-uv v6.7.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Run Ruff
        run: uv run --group dev --frozen ruff check
      - name: Build docs
        run: |
          uv run --group docs --frozen sphinx-build \
            -b html \
            docs/src \
            docs/_build/html
      - name: Run optional DuckDB integration tests
        run: |
          uv run --group dev --group duckdb --frozen \
            pytest tests/test_duckdb.py
